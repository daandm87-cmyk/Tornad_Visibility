KhEhIAAAAAAADIKZWQAAAAAAAAQE4JIQEAAAAAAICcEkICAAAAAAAAOSWEBAAAAAAAAHJKCAkAAAAAAADklBASAAAAAAAAyCkhJAAAAAAAAJBTQkgAAAAAAAAgp4SQAAAAAAAAQE4JIQEAAAAAAICcEkICAAAAAAAAOSWEBAAAAAAAAHJKCAkAAAAAAADklBASAAAAAAAAiFz6/wDdo37g6z04WQAAAABJRU5ErkJggg==", "diagnostics": {"mlcape_max": 4400.0, "srh01_max": 370.0, "shear06_max": 41.25659942626953, "lcl_med": 604.9227905273438, "sr_kt_max": 113.93974304199219, "stp_min": 0.0, "stp_max": 1.5904678106307983, "refc_max": 65.5, "stp_pixels": 3347, "ca_favorable_pixels": 84659}}];
const img = document.getElementById('frame');
const slider = document.getElementById('slider');
const label = document.getElementById('frame-label');
const diag = document.getElementById('diagnostics');
const playBtn = document.getElementById('play');

let playing = false;
let playInterval = null;

function show(i) {
  const f = FRAMES[i];
  img.src = f.src;
  label.textContent = f.label;
  const d = f.diagnostics;
  diag.textContent =
    `MLCAPE max:  ${d.mlcape_max.toFixed(0).padStart(6)} J/kg     ` +
    `SRH01 max:   ${d.srh01_max.toFixed(0).padStart(6)} m²/s²\n` +
    `Shear06 max: ${d.shear06_max.toFixed(1).padStart(6)} m/s     ` +
    `SR300 max:   ${d.sr_kt_max.toFixed(1).padStart(6)} kt\n` +
    `STP range:   ${d.stp_min.toFixed(2)} – ${d.stp_max.toFixed(2)}     ` +
    `refc max:    ${d.refc_max.toFixed(1)} dBZ\n` +
    `Pixels with STP > 0.5: ${d.stp_pixels.toLocaleString()}`;
}

slider.addEventListener('input', () => show(+slider.value));

playBtn.addEventListener('click', () => {
  playing = !playing;
  if (playing) {
    playBtn.textContent = '⏸ Pause';
    playBtn.classList.add('playing');
    playInterval = setInterval(() => {
      let v = (+slider.value + 1) % FRAMES.length;
      slider.value = v;
      show(v);
    }, 700);
  } else {
    playBtn.textContent = '▶ Play';
    playBtn.classList.remove('playing');
    clearInterval(playInterval);
  }
});

// Keyboard arrows
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') {
    slider.value = Math.min(+slider.value + 1, FRAMES.length - 1);
    show(+slider.value);
  } else if (e.key === 'ArrowLeft') {
    slider.value = Math.max(+slider.value - 1, 0);
    show(+slider.value);
  }
});

show(0);
</script>
